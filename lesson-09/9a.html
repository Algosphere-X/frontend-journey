<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson 09 Pratice</title>
    <link rel="stylesheet" href="9a.css">
</head>
<body>
    <div class="red"></div>
    <div class="green"></div>

    <div class="card">
        <p>Satisfied with our service?</p>
        <button>Yes</button>
        <button>No</button>
    </div>

    <div class="youtube">
        <p class="name">Install YouTube Music</p>
        <p class="reminder">Add YouTube Music to your desktop for quick and easy access.</p>
    </div>

    <div class="tweet">
        <img class="cat-4" src="image.png">
        <input class="tweet-search" type="text" placeholder="What's happening?">
        <button class="tweer-button">Tweet</button>
    </div>

    <div class="photocard">
        <img class="cat" src="image.png">
        <p class="name-1">Oliver</p>
        <p class="friend">2 mutual friends</p>
        <button class="add-friend">Add Friend</button>
    </div>
    <div class="photocard">
        <img class="cat" src="image copy 2.png">
        <p class="name-1">Rex</p>
        <p class="friend">3 mutual friends</p>
        <button class="add-friend">Add Friend</button>
    </div>
    <div class="photocard">
        <img class="cat" src="image copy.png">
        <p class="name-1">Mimi</p>
        <p class="friend">5 mutual friends</p>
        <button class="add-friend">Add Friend</button>
    </div>

    <div class="google-div">
        <img class="google" src="image copy 4.png">
        <input class="google-search-bar" type="text" placeholder="Search Google or type a URL">
        <button class="g-search">Google Search</button>
        <button class="lucky">I'm feeling lucky</button>
    </div>

</body>
</html>
